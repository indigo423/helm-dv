    description: 'Delta-V — composable, containerized OpenNMS Horizon. Deploys the
      Spring Boot daemon plane (alarmd, pollerd, collectd, …), the flow pipeline,
      and the Minion ingress plane (envoy + minion-gateway). Backing services (PostgreSQL,
      Kafka, ClickHouse, VictoriaMetrics, Grafana) are optional, condition-gated subcharts:
      off by default (point at external/operator-managed instances); flipped on by
      the bundled values-demo.yaml for a self-contained in-cluster demo. '
