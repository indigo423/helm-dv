{{/*
Chart-managed DB Secret. Only rendered when the operator did NOT supply an
existing Secret via global.postgres.existingSecret. Production deployments
should prefer an externally-managed Secret (existingSecret) over this.
*/}}
{{- if not .Values.global.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deltav.dbSecretName" . }}
  labels:
    {{- include "deltav.labels" . | nindent 4 }}
  annotations:
    # Created as a pre-install/upgrade hook with an earlier weight than the
    # db-init Job (-10 < -5), so the password Secret exists before the schema
    # hook runs. before-hook-creation (no hook-succeeded) keeps it in the
    # cluster afterwards so the daemon Deployments can reference it too.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  {{ .Values.global.postgres.passwordKey | default "password" }}: {{ .Values.global.postgres.password | default "opennms" | quote }}
{{- end }}
