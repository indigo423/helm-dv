# CI kind-install overlay — layered ON TOP of values-demo.yaml (which provides
# the first-party demo postgres/kafka via demoBackingServices). This overlay
# repoints daemon images at the public ghcr.io/pbrane registry, trims to a lean
# daemon subset + heaps so the install fits a GitHub runner, and disables the
# grafana/VM subcharts + minion to keep the smoke fast — still exercising the
# demo-backing hook ordering, the db-init wait-for-postgres, DB/Kafka-backed
# daemon boot, the provisiond PVC + imports-seed initContainer, and envoy/
# minion-gateway. (The demo postgres:16 / apache/kafka:3.9.1 are upstream images,
# unaffected by the registry override.)
global:
  image:
    registry: ghcr.io/pbrane
    tag: "1.3.0"
    pullPolicy: IfNotPresent

metrics:
  serviceMonitor:
    enabled: false   # no Prometheus Operator CRDs on bare kind

# Trim the grafana/VM subcharts for a fast smoke (values-demo enables them);
# minion is disabled in the block below.
victoriametrics:
  enabled: false
grafana:
  enabled: false

# Lean heaps + a minimal representative daemon set so the smoke install fits a
# GitHub runner and finishes within the wait window: alarmd (DB + health probe),
# provisiond (Kafka + PVC + imports-seed initContainer), trapd (sink consumer
# groups), bsmd (small). The full set is still rendered/linted by ct + unittest.
daemons:
  alarmd: { enabled: true, javaOpts: "-Xms128m -Xmx256m -XX:+UseSerialGC" }
  provisiond: { enabled: true, javaOpts: "-Xms192m -Xmx384m -XX:+UseSerialGC", probeInitialDelay: 60 }
  trapd: { enabled: true, javaOpts: "-Xms128m -Xmx256m -XX:+UseSerialGC" }
  bsmd: { enabled: true, javaOpts: "-Xms128m -Xmx256m -XX:+UseSerialGC" }
  # Trimmed from the CI smoke (still rendered/linted by ct + unittest):
  pollerd: { enabled: false }
  collectd: { enabled: false }
  discovery: { enabled: false }
  syslogd: { enabled: false }
  eventtranslator: { enabled: false }
  enlinkd: { enabled: false }
  perspectivepollerd: { enabled: false }
  telemetryd: { enabled: false }
  flow-enricher: { enabled: false }
  alarms-materializer: { enabled: false }
  prometheus-writer: { enabled: false }
  alerts-forwarder: { enabled: false }

minionGateway:
  enabled: true
  javaOpts: "-Xms128m -Xmx256m"
envoy:
  enabled: true
minion:
  enabled: false

initJobs:
  dbInit:
    javaToolOptions: "-Xms128m -Xmx256m"
  clickhouseInit:
    enabled: false
