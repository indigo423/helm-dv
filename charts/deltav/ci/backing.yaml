# CI test fixture (NOT part of the chart): minimal PostgreSQL + Kafka for the
# kind install smoke. Named `postgres` / `kafka` so the chart's default endpoints
# resolve unchanged. Applied by `make kind-test` before `helm install`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels: { app: postgres }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:15
          args: ["-c", "max_connections=350"]
          env:
            - { name: POSTGRES_DB, value: opennms }
            - { name: POSTGRES_USER, value: opennms }
            - { name: POSTGRES_PASSWORD, value: opennms }
            - { name: POSTGRES_HOST_AUTH_METHOD, value: md5 }
            - { name: POSTGRES_INITDB_ARGS, value: "--auth=md5" }
          ports: [{ containerPort: 5432 }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "opennms", "-d", "opennms"] }
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: postgres }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels: { app: kafka }
spec:
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:latest
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            # Single combined node: the controller quorum voter must be localhost,
            # not the Service — a ClusterIP Service has no endpoints until the pod
            # is Ready, but the pod can't get Ready until it reaches its controller.
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: CLUSTER_ID, value: "delta-v-kafka-cluster" }
            - { name: KAFKA_HEAP_OPTS, value: "-Xms256m -Xmx512m" }
          ports: [{ containerPort: 9092 }]
          readinessProbe:
            tcpSocket: { port: 9092 }
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: kafka }
spec:
  selector: { app: kafka }
  ports:
    - { name: client, port: 9092, targetPort: 9092 }
    - { name: controller, port: 9093, targetPort: 9093 }
