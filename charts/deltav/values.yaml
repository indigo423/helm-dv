# Delta-V — production-shaped defaults.
#
# Backing services (PostgreSQL, Kafka, ClickHouse, VictoriaMetrics, Grafana) are
# DISABLED here: point the global.* endpoints at operator-managed / managed-cloud
# instances. For a self-contained in-cluster demo that bundles them, install with
# `-f values-demo.yaml` (see that file and the chart README).

nameOverride: ""
fullnameOverride: ""

global:
  image:
    # Published images: ghcr.io/pbrane. Local builds use `deltav`.
    registry: ghcr.io/pbrane
    tag: ""            # defaults to Chart.appVersion when blank
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  instanceId: DeltaV
  kafka:
    # Backing-service mode: external | managed | demo (Kafka is required).
    #   external - chart provisions nothing; daemons wire to bootstrapServers (default).
    #   managed  - Strimzi-provisioned cluster (reserved; not yet implemented).
    #   demo     - first-party single-node broker (demoBackingServices).
    mode: external
    # Bootstrap servers for all daemons. Blank-safe default matches the compose
    # hostname so the bundled Kafka subchart (fullnameOverride: kafka) just works.
    bootstrapServers: "kafka:9092"
  postgres:
    # Backing-service mode: external | managed | demo | demo-legacy.
    #   external    - chart provisions nothing; daemons wire to host + secret below (default).
    #   managed     - CloudNativePG-provisioned HA Cluster (CNPG operator must be installed).
    #   demo        - CloudNativePG-provisioned single-instance Cluster (ephemeral).
    #   demo-legacy - first-party single-node postgres Deployment (rollback path).
    mode: external
    # Used in external/demo-legacy modes; ignored in managed/demo (host = CNPG -rw service).
    host: "postgres"
    port: 5432
    database: opennms
    username: opennms
    # Used only when existingSecret is empty (chart-managed Secret).
    password: opennms
    passwordKey: password
    # Prefer this in production: name of a pre-created Secret holding the password.
    # In managed/demo modes this Secret MUST be type kubernetes.io/basic-auth with
    # keys `username` (equal to global.postgres.username) and `password` — CNPG
    # consumes it as the Cluster bootstrap secret and will mis-bootstrap an Opaque
    # or username-mismatched Secret.
    existingSecret: ""
  # ClickHouse (flow schema). Optional service — mode: off | external | managed | demo.
  #   off      - no ClickHouse; clickhouse-init skipped (default).
  #   external - run clickhouse-init DDL against the host below (bring-your-own).
  #   managed  - Altinity operator (reserved; not yet implemented).
  # The flow→ClickHouse writer is out-of-chart; external mode is schema-only.
  clickhouse:
    # Blank = off, unless the deprecated top-level clickhouse.enabled/external is
    # set (legacy shim → external). Set explicitly to off|external to override.
    mode: ""
    # Blank fields fall back to the documented default AND let the legacy top-level
    # clickhouse.* keys win when only those are set (one-release shim).
    host: ""                 # effective default: clickhouse
    auth:
      username: ""           # effective default: deltav
      # Plaintext fallback; prefer auth.existingSecret (consumed via secretKeyRef).
      password: ""           # effective default: deltav
      existingSecret: ""
  # Metrics remote-write target (VictoriaMetrics or any Prometheus-remote-write
  # endpoint: Mimir/Thanos/Grafana Cloud). Optional — mode: off | external | managed | demo.
  #   off      - no remote-write target wired (default; prometheus-writer stays off).
  #   external - daemons push to remoteWriteUrl below (bring-your-own).
  #   demo     - bundled victoria-metrics-single subchart.
  #   managed  - VictoriaMetrics Operator (reserved; not yet implemented).
  metrics:
    mode: "off"
    remoteWriteUrl: http://victoriametrics:8428/api/v1/write
  # Grafana (dashboards). Optional — mode: off | external | managed | demo.
  #   off      - render nothing (default).
  #   external - emit dashboard/datasource artifacts for your existing Grafana.
  #   demo     - bundled grafana subchart.
  #   managed  - Grafana Operator (reserved; not yet implemented).
  grafana:
    mode: "off"
    # Datasource URL for emitted artifacts; blank → derived from global.metrics.
    datasourceUrl: ""

# Per-daemon Prometheus scraping via ServiceMonitor (requires Prometheus/VM
# Operator CRDs). Replaces the compose vmagent scrape sidecar.
metrics:
  serviceMonitor:
    enabled: false
    interval: 15s
    labels: {}

# ---------------------------------------------------------------------------
# Daemons. Each entry renders Deployment + Service (+ optional ServiceMonitor /
# imports PVC) from templates/_daemon.tpl. JAVA_OPTS and every extraEnv value
# are run through `tpl`, so {{ ... }} references resolve at render time.
# `usesDatabase`/`usesKafka` default true; set false to omit those env blocks.
# ---------------------------------------------------------------------------
daemons:

  alarmd:
    enabled: true
    tsidNodeId: 23
    javaOpts: "-Xms512m -Xmx1g -XX:MaxMetaspaceSize=256m"
    consumerGroup: opennms-alarmd

  pollerd:
    enabled: true
    tsidNodeId: 4
    javaOpts: "-Xms512m -Xmx1g -XX:MaxMetaspaceSize=256m -Dorg.opennms.core.ipc.twin.kafka.bootstrap.servers={{ include \"deltav.kafkaBootstrap\" . }} -Dorg.opennms.core.ipc.rpc.force-remote=true"
    consumerGroup: opennms-pollerd
    extraEnv:
      OPENNMS_RPC_KAFKA_ENABLED: "true"
      OPENNMS_RPC_KAFKA_BOOTSTRAP_SERVERS: '{{ include "deltav.kafkaBootstrap" . }}'
      DELTAV_TIMESERIES_ENABLED: "true"

  collectd:
    enabled: true
    # collectd takes its TSID node-id via -D (compose parity), not the env var.
    javaOpts: "-Xms512m -Xmx1g -Dorg.opennms.tsid.node-id=5"
    stopGracePeriodSeconds: 60
    extraEnv:
      OPENNMS_TIMESERIES_STRATEGY: inmemory
      DELTAV_TIMESERIES_ENABLED: "true"

  discovery:
    enabled: true
    tsidNodeId: 24
    javaOpts: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
    stopGracePeriodSeconds: 60
    extraEnv:
      INTERFACE_NODE_CACHE_REFRESH_MS: "15000"
      RPC_KAFKA_BOOTSTRAP_SERVERS: '{{ include "deltav.kafkaBootstrap" . }}'
      RPC_KAFKA_FORCE_REMOTE: "true"

  trapd:
    enabled: true
    tsidNodeId: 20
    javaOpts: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
    consumerGroup: opennms-trapd
    sinkConsumerGroup: opennms-trapd-sink
    extraEnv:
      INTERFACE_NODE_CACHE_REFRESH_MS: "15000"

  syslogd:
    enabled: true
    tsidNodeId: 21
    javaOpts: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
    consumerGroup: opennms-syslogd
    sinkConsumerGroup: opennms-syslogd-sink
    extraEnv:
      INTERFACE_NODE_CACHE_REFRESH_MS: "15000"

  eventtranslator:
    enabled: true
    tsidNodeId: 22
    javaOpts: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
    consumerGroup: opennms-eventtranslator

  enlinkd:
    enabled: true
    javaOpts: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m -Dopennms.home=/opt/deltav"
    consumerGroup: enlinkd
    stopGracePeriodSeconds: 60
    extraEnv:
      OPENNMS_RPC_KAFKA_ENABLED: "true"

  bsmd:
    enabled: true
    tsidNodeId: 17
    javaOpts: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m -Dorg.opennms.alarms.snapshot.sync.ms=10000"
    consumerGroup: opennms-bsmd

  provisiond:
    enabled: true
    tsidNodeId: 25
    javaOpts: "-Xms512m -Xmx1g -XX:MaxMetaspaceSize=256m"
    # provisiond is the slowest to first-healthy (requisition import on top of
    # Spring Boot init); give the readiness probe a long head start.
    probeInitialDelay: 60
    stopGracePeriodSeconds: 60
    extraEnv:
      RPC_KAFKA_ENABLED: "true"
      RPC_KAFKA_BOOTSTRAP_SERVERS: '{{ include "deltav.kafkaBootstrap" . }}'
      RPC_KAFKA_FORCE_REMOTE: "true"
    # Mutable requisition state persisted on a PVC; seeded by an initContainer
    # from the baked requisition seed (signature-compare).
    seed:
      enabled: true
      image: provisiond-imports-init
      mountPath: /opt/deltav/etc/imports
      size: 1Gi
    # Stub reverse-DNS for the mhuot-lab requisition addresses (compose parity).
    hostAliases:
      - ip: "172.20.20.2"
        hostnames: ["mhuot-lab-2"]
      - ip: "172.20.20.3"
        hostnames: ["mhuot-lab-3"]
      - ip: "172.20.20.4"
        hostnames: ["mhuot-lab-4"]
      - ip: "172.20.20.5"
        hostnames: ["mhuot-lab-5"]
      - ip: "172.20.20.6"
        hostnames: ["mhuot-lab-6"]

  perspectivepollerd:
    enabled: true
    tsidNodeId: 7
    javaOpts: "-Xms512m -Xmx1g -XX:MaxMetaspaceSize=256m -Dorg.opennms.core.ipc.rpc.force-remote=true"
    consumerGroup: opennms-perspectivepollerd
    extraEnv:
      OPENNMS_RPC_KAFKA_ENABLED: "true"
      OPENNMS_RPC_KAFKA_BOOTSTRAP_SERVERS: '{{ include "deltav.kafkaBootstrap" . }}'
      DELTAV_PERSPECTIVE_TIMESERIES_ENABLED: "true"

  telemetryd:
    enabled: true
    tsidNodeId: 18
    javaOpts: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m -Dorg.opennms.core.ipc.sink.kafka.bootstrap.servers={{ include \"deltav.kafkaBootstrap\" . }} -Dorg.opennms.core.ipc.sink.kafka.group.id=opennms-telemetryd-sink -Dorg.opennms.core.ipc.twin.kafka.bootstrap.servers={{ include \"deltav.kafkaBootstrap\" . }}"
    consumerGroup: opennms-telemetryd

  flow-enricher:
    enabled: true
    javaOpts: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
    probeInitialDelay: 30
    extraEnv:
      DELTAV_FLOWS_SINK_TOPICS: "DeltaV.Sink.Telemetry-Netflow-5,DeltaV.Sink.Telemetry-Netflow-9,DeltaV.Sink.Telemetry-IPFIX,DeltaV.Sink.Telemetry-SFlow"
      DELTAV_FLOWS_OUTPUT_TOPIC: deltav-flows
      DELTAV_FLOWS_DNS_ENABLED: "true"
      DELTAV_FLOWS_DNS_SCOPE: all

  alarms-materializer:
    enabled: true
    # Uses SPRING_KAFKA_BOOTSTRAP_SERVERS (not KAFKA_BOOTSTRAP_SERVERS).
    usesKafka: false
    extraEnv:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: '{{ include "deltav.kafkaBootstrap" . }}'
      DELTAV_ALARMS_STATE_TOPIC: deltav-alarms-state-change

  # Consumes deltav-timeseries → remote-writes to VictoriaMetrics. Only useful
  # where a remote-write target exists; enable under the metrics/demo stack.
  prometheus-writer:
    enabled: false
    usesDatabase: false
    usesKafka: false
    extraEnv:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: '{{ include "deltav.kafkaBootstrap" . }}'
      PROMETHEUS_WRITER_REMOTE_WRITE_URL: '{{ include "deltav.metricsRemoteWriteUrl" . }}'
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx512m"
    probePath: /actuator/health/readiness

  # Forwards alerts to an Alertmanager. Disabled by default — set an external
  # Alertmanager URL before enabling (Alertmanager is not bundled by this chart).
  alerts-forwarder:
    enabled: false
    usesDatabase: false
    usesKafka: false
    probeInitialDelay: 30
    extraEnv:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: '{{ include "deltav.kafkaBootstrap" . }}'
      DELTAV_ALERTS_ALERTMANAGER_URL: ""
      DELTAV_ALERTS_ALERTMANAGER_ENABLED: "false"
      DELTAV_ALERTS_VM_ENABLED: "true"

# ---------------------------------------------------------------------------
# Minion ingress plane. envoy + minion-gateway are the sole inbound surface for
# Minions and are always deployed. The in-chart Minion AGENT is optional and OFF
# here (production Minions deploy separately, per location); the demo preset
# turns it on.
# ---------------------------------------------------------------------------
minionGateway:
  enabled: true
  image: minion-gateway
  replicas: 1
  javaOpts: "-Xms256m -Xmx512m"
  resources: {}

envoy:
  enabled: true
  image: envoy
  replicas: 1
  # gRPC h2c surface for Minions. Use LoadBalancer (or an Ingress with gRPC) to
  # expose it outside the cluster.
  service:
    type: ClusterIP
    port: 8443
  resources: {}

minion:
  enabled: false
  image: minion-boot
  id: minion-default-01
  location: Default
  javaOpts: "-Xms256m -Xmx512m -Djava.security.egd=file:/dev/./urandom"
  gateway:
    host: ""        # blank → derived from the in-chart envoy Service
    port: 8443
  # UDP listeners (trap/syslog/flow). LoadBalancer is required for real ingest;
  # the demo preset falls back to NodePort. See chart README.
  udp:
    service:
      type: ClusterIP
    ports:
      - { name: trap, port: 1162, protocol: UDP }
      - { name: syslog, port: 1514, protocol: UDP }
      - { name: flow, port: 4729, protocol: UDP }
  resources: {}

# ---------------------------------------------------------------------------
# One-shot schema init as Helm hooks (pre-install,pre-upgrade).
# ---------------------------------------------------------------------------
initJobs:
  dbInit:
    enabled: true
    image: db-init
    javaToolOptions: "-Xms256m -Xmx512m"
  clickhouseInit:
    # Gated additionally on clickhouse.enabled.
    enabled: true
    image: clickhouse-init
    flowsRawTtlDays: "14"
    flowsAggTtlDays: "90"

# ---------------------------------------------------------------------------
# CloudNativePG-managed PostgreSQL. Rendered as a CNPG `Cluster`
# (templates/backing/postgres-cluster.yaml) when global.postgres.mode is
# `managed` or `demo`. Requires the CNPG operator (postgresql.cnpg.io CRDs)
# installed in the cluster — assume-installed, NOT a vendored subchart. PG 16 is
# the supported/tested operand.
# ---------------------------------------------------------------------------
postgresCluster:
  imageName: "ghcr.io/cloudnative-pg/postgresql:16"
  # Production HA preset (mode=managed): >=3 instances, anti-affinity, WAL storage.
  managed:
    instances: 3
    storage:
      size: 10Gi
      storageClass: ""      # blank = cluster default StorageClass
    walStorage:
      size: 2Gi
      storageClass: ""
    # Tuned PostgreSQL parameters. max_connections matches the OpenNMS profile.
    parameters:
      max_connections: "350"
    resources: {}
  # Single-node ephemeral preset (mode=demo): 1 instance, no WAL storage.
  demo:
    instances: 1
    storage:
      size: 1Gi
      storageClass: ""
    parameters:
      max_connections: "350"
    resources: {}

# ---------------------------------------------------------------------------
# Demo datastores (PostgreSQL + Kafka). First-party manifests (not Bitnami) —
# templates/demo-backing.yaml. OFF here: production points global.* at external
# services. values-demo.yaml turns this ON. Single-node, no persistence — a demo.
# The raw postgres Deployment backs external/demo-legacy demos only; managed/demo
# modes use the CNPG Cluster above instead. Kafka is unaffected (own migration).
# ---------------------------------------------------------------------------
demoBackingServices:
  enabled: false
  postgres:
    image: postgres:16
    resources: {}
  kafka:
    image: apache/kafka:3.9.1
    heapOpts: "-Xms256m -Xmx512m"
    resources: {}
  # Image used by the db-init wait-for-postgres initContainer (demo only).
  waitImage: busybox:1.37

# ClickHouse config has MOVED to global.clickhouse (mode/host/auth). The former
# top-level `clickhouse.{enabled,external,host,auth}` keys are DEPRECATED but still
# honored for one release via a shim (global.clickhouse.mode wins; legacy
# enabled/external map to mode external). Set global.clickhouse.mode instead.

# ---------------------------------------------------------------------------
# Demo subcharts (non-Bitnami), condition-gated by enabled. OFF here; flipped on
# by values-demo.yaml. NOTE: Helm routes subchart values by dependency name/alias,
# so these stay top-level (they cannot move under global.*). The demo preset sets
# both global.metrics.mode/global.grafana.mode AND the matching enabled here —
# Helm's static `condition:` cannot evaluate mode == demo.
# ---------------------------------------------------------------------------
victoriametrics:
  enabled: false
grafana:
  enabled: false
