# Delta-V — self-contained demo preset (mirrors compose PROFILE=demo).
#
#   helm dependency build charts/deltav   # vendor the grafana/VM subcharts
#   helm install deltav charts/deltav -f charts/deltav/values-demo.yaml
#
# Demo datastores (PostgreSQL + Kafka) are first-party single-node manifests
# (templates/demo-backing.yaml) — NOT Bitnami. Grafana + VictoriaMetrics remain
# (non-Bitnami) subcharts. ClickHouse is NOT bundled, so the flow pipeline
# (flow-enricher / clickhouse-init) is disabled here; point it at an external
# ClickHouse for flows.

global:
  # Local builds use the `deltav` prefix; switch to ghcr.io/pbrane for published.
  image:
    registry: deltav
    pullPolicy: IfNotPresent
  kafka:
    bootstrapServers: "kafka:9092"
  postgres:
    # CloudNativePG-managed single-node demo (the CNPG operator must be installed
    # — `make kind-test` installs it). Use mode: demo-legacy for the operator-free
    # raw postgres Deployment. A non-default password is not required for demo.
    mode: demo
    password: demo
    host: postgres

# ServiceMonitor needs the Prometheus-Operator CRDs, absent on bare kind/minikube
# — keep OFF so `helm install -f values-demo.yaml` applies on a plain cluster.
metrics:
  serviceMonitor:
    enabled: false

# First-party demo PostgreSQL + Kafka (replaces the Bitnami subcharts).
demoBackingServices:
  enabled: true

daemons:
  prometheus-writer:
    enabled: true
  # No bundled ClickHouse → the flow pipeline has nowhere to write. Disable it
  # here; for a flows demo, supply an external ClickHouse and re-enable.
  flow-enricher:
    enabled: false
  # alerts-forwarder stays off unless you supply an external Alertmanager URL.

# ClickHouse not bundled → keep its init hook off.
initJobs:
  clickhouseInit:
    enabled: false

# Expose the Minion ingress and an in-chart demo Minion. kind/minikube have no
# cloud LB, so use NodePort here; on a cloud cluster switch these to LoadBalancer.
envoy:
  service:
    type: NodePort

minion:
  enabled: true
  udp:
    service:
      type: NodePort

# --- Bundled (non-Bitnami) subcharts ---------------------------------------
victoriametrics:
  enabled: true
  # routed via the `victoriametrics` alias (see Chart.yaml). Service name pinned
  # to `victoriametrics` to match prometheus-writer's remote-write URL.
  server:
    fullnameOverride: victoriametrics
    retentionPeriod: 1

grafana:
  enabled: true
  fullnameOverride: grafana
  # Run the latest Grafana 13 app. The grafana chart (10.5.15) ships app 12.3.1
  # by default; override the image tag (chart version != app version).
  image:
    tag: "13.0.2"
  service:
    type: NodePort
  adminPassword: admin
