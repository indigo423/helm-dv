apiVersion: v2
name: deltav
description: |
  Delta-V — composable, containerized OpenNMS Horizon. Deploys the Spring Boot
  daemon plane (alarmd, pollerd, collectd, …), the flow pipeline, and the Minion
  ingress plane (envoy + minion-gateway). Backing services (PostgreSQL, Kafka,
  ClickHouse, VictoriaMetrics, Grafana) are optional, condition-gated subcharts:
  off by default (point at external/operator-managed instances); flipped on by
  the bundled values-demo.yaml for a self-contained in-cluster demo.
type: application
# Chart version is independent of the app; bump on chart changes.
version: 0.1.0
# Tracks the Delta-V release the default image tag points at.
appVersion: "1.3.0"
kubeVersion: ">=1.25.0-0"
keywords:
  - opennms
  - monitoring
  - network
  - kafka
home: https://github.com/pbrane/delta-v
sources:
  - https://github.com/pbrane/delta-v
maintainers:
  - name: Delta-V

# Backing services as condition-gated subchart dependencies (Decision 3).
# Each defaults OFF in values.yaml (production: external endpoints) and ON in
# values-demo.yaml (self-contained demo). `helm dependency build` requires
# network access to populate Chart.lock; run `make helm-deps` to vendor them.
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: kafka
    version: "31.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  - name: clickhouse
    version: "9.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: clickhouse.enabled
  - name: victoria-metrics-single
    version: "0.x.x"
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoriametrics.enabled
  - name: grafana
    version: "8.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
