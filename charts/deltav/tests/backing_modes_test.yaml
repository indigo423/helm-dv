suite: backing-service mode enum and resolvers
release:
  name: deltav
  namespace: default
tests:
  - it: optional services default to off — no clickhouse-init by default
    templates:
      - templates/hooks/clickhouse-init-job.yaml
    asserts:
      - hasDocuments: { count: 0 }

  - it: an invalid required-service mode fails rendering with the allowed set
    templates:
      - templates/daemons.yaml
    set:
      global: { kafka: { mode: bogus } }
    asserts:
      - failedTemplate:
          errorPattern: 'global\.kafka\.mode must be one of \[external managed demo\], got "bogus"'

  - it: managed clickhouse is reserved and fails with a directive
    templates:
      - templates/hooks/clickhouse-init-job.yaml
    set:
      global: { clickhouse: { mode: managed } }
    asserts:
      - failedTemplate:
          errorPattern: 'global\.clickhouse\.mode: managed is not yet implemented'

  - it: external clickhouse renders the init job against the configured host
    templates:
      - templates/hooks/clickhouse-init-job.yaml
    set:
      global:
        clickhouse:
          mode: external
          host: ch.example
          auth: { username: flowuser }
    asserts:
      - hasDocuments: { count: 1 }
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="CLICKHOUSE_HOST")].value
          value: "ch.example"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="CLICKHOUSE_USER")].value
          value: "flowuser"

  - it: legacy clickhouse.external=true is honored via the deprecation shim
    templates:
      - templates/hooks/clickhouse-init-job.yaml
    set:
      clickhouse: { external: true, host: legacy.ch }
    asserts:
      - hasDocuments: { count: 1 }
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="CLICKHOUSE_HOST")].value
          value: "legacy.ch"

  - it: new global.clickhouse.host wins over the legacy top-level key
    templates:
      - templates/hooks/clickhouse-init-job.yaml
    set:
      global: { clickhouse: { mode: external, host: new.ch } }
      clickhouse: { host: legacy.ch }
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="CLICKHOUSE_HOST")].value
          value: "new.ch"

  - it: external metrics resolves the prometheus-writer remote-write URL via the helper
    templates:
      - templates/daemons.yaml
    documentSelector:
      path: spec.template.spec.containers[0].name
      value: prometheus-writer
    set:
      global:
        metrics:
          mode: external
          remoteWriteUrl: https://vm.example/api/v1/write
      daemons:
        prometheus-writer: { enabled: true }
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="PROMETHEUS_WRITER_REMOTE_WRITE_URL")].value
          value: https://vm.example/api/v1/write

  - it: kafka security.existingSecret without protocol fails fast (no silent dangling credential)
    templates:
      - templates/daemons.yaml
    set:
      global: { kafka: { security: { existingSecret: kafka-creds } } }
    asserts:
      - failedTemplate:
          errorPattern: 'existingSecret is set but global\.kafka\.security\.protocol is empty'

  - it: invalid metrics auth type fails with the allowed schemes
    templates:
      - templates/daemons.yaml
    set:
      global: { metrics: { auth: { type: oauth, existingSecret: s } } }
    asserts:
      - failedTemplate:
          errorPattern: 'global\.metrics\.auth\.type must be one of \[bearer basic\], got "oauth"'

  - it: managed mode names the specific operator (Strimzi for kafka)
    templates:
      - templates/daemons.yaml
    set:
      global: { kafka: { mode: managed } }
    asserts:
      - failedTemplate:
          errorPattern: 'track the Strimzi operator change'
