suite: schema-init hooks and DB secret ordering
release:
  name: deltav
  namespace: default
tests:
  - it: db-init is a pre-install/upgrade hook ahead of the daemons
    templates:
      - templates/hooks/db-init-job.yaml
    asserts:
      - isKind: { of: Job }
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-5"

  - it: the DB secret is itself a hook, weighted before db-init, kept after
    templates:
      - templates/secret.yaml
    asserts:
      - isKind: { of: Secret }
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-10"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation

  - it: no chart secret is rendered when an existing secret is supplied
    templates:
      - templates/secret.yaml
    set:
      global:
        postgres:
          existingSecret: my-db-secret
    asserts:
      - hasDocuments: { count: 0 }

  - it: db-init gains a wait-for-postgres initContainer in demo mode
    templates:
      - templates/hooks/db-init-job.yaml
    set:
      demoBackingServices:
        enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-postgres

  - it: managed mode runs db-init as a post-install hook against the owned DB with a pg_isready wait
    templates:
      - templates/hooks/db-init-job.yaml
    set:
      global: { postgres: { mode: managed, password: testsecret } }
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install
      - notExists:
          path: metadata.annotations["helm.sh/hook-weight"]
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: OPENNMS_DBINIT_ADMIN_URL
      - matchRegex:
          path: spec.template.spec.containers[0].env[0].value
          pattern: -pg-rw:5432/opennms$
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-postgres
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: pg_isready

  - it: clickhouse-init is absent unless ClickHouse is present
    templates:
      - templates/hooks/clickhouse-init-job.yaml
    asserts:
      - hasDocuments: { count: 0 }

  - it: clickhouse-init renders when the bundled ClickHouse is enabled
    templates:
      - templates/hooks/clickhouse-init-job.yaml
    set:
      clickhouse:
        enabled: true
    asserts:
      - hasDocuments: { count: 1 }
      - isKind: { of: Job }
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
