suite: CNPG postgres cluster backing
templates:
  - templates/backing/postgres-cluster.yaml
release:
  name: deltav
  namespace: default
tests:
  - it: renders nothing in external mode (default)
    asserts:
      - hasDocuments: { count: 0 }

  - it: renders nothing in demo-legacy mode (raw Deployment is used instead)
    set:
      global: { postgres: { mode: demo-legacy } }
    asserts:
      - hasDocuments: { count: 0 }

  - it: managed mode renders an HA Cluster (3 instances, anti-affinity, WAL storage)
    set:
      global: { postgres: { mode: managed, password: testsecret } }
    asserts:
      - hasDocuments: { count: 1 }
      - isKind: { of: Cluster }
      - equal: { path: apiVersion, value: postgresql.cnpg.io/v1 }
      - equal: { path: spec.instances, value: 3 }
      - equal: { path: spec.affinity.enablePodAntiAffinity, value: true }
      - isNotNullOrEmpty: { path: spec.walStorage.size }
      - equal: { path: spec.imageName, value: "ghcr.io/cloudnative-pg/postgresql:16" }

  - it: demo mode renders a single-instance Cluster with no WAL storage
    set:
      global: { postgres: { mode: demo } }
    asserts:
      - hasDocuments: { count: 1 }
      - isKind: { of: Cluster }
      - equal: { path: spec.instances, value: 1 }
      - isNull: { path: spec.walStorage }
      - isNull: { path: spec.affinity }

  - it: bootstrap initdb owner equals the configured username and references the chart secret
    set:
      global: { postgres: { mode: managed, password: testsecret } }
    asserts:
      - equal: { path: spec.bootstrap.initdb.owner, value: opennms }
      - equal: { path: spec.bootstrap.initdb.database, value: opennms }
      - equal: { path: spec.bootstrap.initdb.secret.name, value: deltav-db }

  - it: managed mode fails when the password is left at the insecure default
    set:
      global: { postgres: { mode: managed } }
    asserts:
      - failedTemplate:
          errorMessage: 'global.postgres.password must be set to a non-default, non-empty value when global.postgres.mode is managed (production); provide global.postgres.password or global.postgres.existingSecret — an empty or default "opennms" password is insecure.'

  - it: managed mode fails when the password is explicitly empty
    set:
      global: { postgres: { mode: managed, password: "" } }
    asserts:
      - failedTemplate:
          errorMessage: 'global.postgres.password must be set to a non-default, non-empty value when global.postgres.mode is managed (production); provide global.postgres.password or global.postgres.existingSecret — an empty or default "opennms" password is insecure.'

  - it: managed/demo mode fails when passwordKey is not "password"
    set:
      global: { postgres: { mode: demo, passwordKey: db-password } }
    asserts:
      - failedTemplate:
          errorMessage: 'global.postgres.passwordKey must be "password" when global.postgres.mode is managed or demo (CloudNativePG fixes the basic-auth secret keys to username/password).'

  - it: the values-managed preset renders a managed HA cluster (with a supplied password)
    values:
      - ../values-managed.yaml
    set:
      global: { postgres: { password: prodsecret } }
    asserts:
      - hasDocuments: { count: 1 }
      - isKind: { of: Cluster }
      - equal: { path: spec.instances, value: 3 }
      - equal: { path: spec.storage.size, value: 50Gi }
      - equal: { path: spec.walStorage.size, value: 10Gi }
