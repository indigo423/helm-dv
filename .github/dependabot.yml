#
# Keeps the SHA-pinned GitHub Actions current (Dependabot rewrites both the SHA
# and the trailing version comment).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
