# Keeps the SHA-pinned GitHub Actions current (Dependabot rewrites both the SHA
# and the trailing version comment).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"

  # Keeps the chart's Helm dependencies (grafana, victoria-metrics-single)
  # current. HTTPS repos → native Dependabot suffices (no OCI/Renovate needed).
  - package-ecosystem: helm
    directory: /charts/deltav
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
    groups:
      chart-deps:
        patterns:
          - "*"
