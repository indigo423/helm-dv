name: CI

on:
  pull_request:
    paths:
      - "charts/**"
      - "ct.yaml"
      - "Makefile"
      - ".yamllint"
      - ".github/workflows/ci.yaml"
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "ct.yaml"
      - "Makefile"
      - ".yamllint"
      - ".github/workflows/ci.yaml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HELM_VERSION: v3.16.4

jobs:
  static:
    name: Lint, unit-test, schema, docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Install kubeconform, helm-docs and helm-unittest
        run: |
          set -euo pipefail
          curl -sSLf https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform
          curl -sSLf https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.7.2

      - name: Vendor subchart dependencies
        run: make deps

      - name: Lint (chart-testing)
        run: make lint

      - name: Unit tests (helm-unittest)
        run: make unittest

      - name: Schema validation (kubeconform)
        run: make kubeconform

      - name: Docs drift check (helm-docs)
        run: make docs-check

  install:
    name: Install on kind + smoke
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 120s

      - name: Vendor subchart dependencies
        run: make deps

      - name: Install chart + smoke test
        run: make kind-test
