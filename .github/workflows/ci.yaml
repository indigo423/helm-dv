name: CI

on:
  pull_request:
    paths:
      - "charts/**"
      - "ct.yaml"
      - "Makefile"
      - ".yamllint"
      - ".github/workflows/ci.yaml"
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "ct.yaml"
      - "Makefile"
      - ".yamllint"
      - ".github/workflows/ci.yaml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HELM_VERSION: v3.16.4

jobs:
  static:
    name: Lint, unit-test, schema, docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@e6669bcd63d7cb57cb4380c33043eebe5d111992 # v2.6.1

      - name: Install kubeconform, helm-docs and helm-unittest
        run: |
          set -euo pipefail
          curl -sSLf https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform
          curl -sSLf https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.7.2

      - name: Vendor subchart dependencies
        run: make deps

      - name: Lint (chart-testing)
        run: make lint

      - name: Unit tests (helm-unittest)
        run: make unittest

      - name: Schema validation (kubeconform)
        run: make kubeconform

      - name: Docs drift check (helm-docs)
        run: make docs-check

  install:
    name: Install on kind + smoke
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Create kind cluster
        uses: helm/kind-action@0025e74a8c7512023d06dc019c617aa3cf561fde # v1.10.0
        with:
          wait: 120s

      - name: Vendor subchart dependencies
        run: make deps

      - name: Install chart + smoke test
        run: make kind-test
