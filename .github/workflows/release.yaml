name: Release

# Runs only after the CI workflow succeeds on main, so a release is never cut
# from a red build. chart-releaser is itself idempotent on unchanged versions.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write   # create GitHub Releases + push to gh-pages
  packages: write   # push the OCI chart to GHCR

concurrency:
  group: release
  cancel-in-progress: false

env:
  HELM_VERSION: v3.16.4

jobs:
  release:
    name: chart-releaser (gh-pages) + OCI push (GHCR)
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Vendor subchart dependencies
        run: make deps

      # Publishes a GitHub Release + index.yaml on gh-pages, only for chart
      # versions not already released (idempotent on unchanged versions).
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@a917fd15b20e8b64b94d9158ad54cd6345335584 # v1.6.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push the same packaged chart to GHCR as an OCI artifact.
      - name: Push chart to GHCR (OCI)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          for chart in charts/*/; do
            name=$(helm show chart "$chart" | awk '/^name:/{print $2}')
            version=$(helm show chart "$chart" | awk '/^version:/{print $2}')
            # Skip if this version is already in the registry.
            if helm show chart "oci://ghcr.io/${{ github.repository }}/$name" --version "$version" >/dev/null 2>&1; then
              echo "oci://ghcr.io/${{ github.repository }}/$name:$version already published — skipping"
              continue
            fi
            helm package "$chart" --destination .oci-packages
            helm push ".oci-packages/${name}-${version}.tgz" "oci://ghcr.io/${{ github.repository }}"
          done
